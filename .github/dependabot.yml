version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    files:
      - /scripts/requirements-test.txt
    groups:
      test-deps:
        patterns:
          - "pytest*"
          - "homeassistant"
          - "pytest-homeassistant-custom-component"
          - "aiohttp"
