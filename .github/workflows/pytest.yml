name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pytest "homeassistant>=2024.1"
          pip install -r scripts/requirements-test.txt
      - name: Run tests
        run: pytest tests/ -q
