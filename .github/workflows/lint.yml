name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: custom_components tests
