# Release- und Beta-Release-Workflow für HACS
# - Tag v*.*.* (z. B. v0.9.0) → normales Release
# - Tag v*.*.*b* oder v*.*.*-beta.* (z. B. v0.9.0b1) → Pre-Release (Beta)
# - Release-Text: docs/releases/v{version}.md (sonst GitHub auto-generate)

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify manifest version matches tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION="$(python3 -c "import json; print(json.load(open('custom_components/fritzbox_vpn/manifest.json'))['version'])")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_FILE="docs/releases/${TAG}.md"
          ARGS=( "$TAG" --title "Release ${TAG}" )
          if [[ "$TAG" == *b* || "$TAG" == *beta* ]]; then
            ARGS+=( --prerelease )
          fi
          if [ -f "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            ARGS+=( --notes-file "$NOTES_FILE" )
          else
            echo "No release notes at $NOTES_FILE; using auto-generated notes"
            ARGS+=( --generate-notes )
          fi
          gh release create "${ARGS[@]}"
