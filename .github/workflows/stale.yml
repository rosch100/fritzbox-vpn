name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: stale-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,dependabot
          exempt-pr-labels: pinned,security,dependabot
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity.
          stale-pr-message: >
            This pull request has been inactive for 60 days and will be closed in
            14 days unless there is new activity.
