# Fritz!Box VPN services
# Call from Developer Tools > Services or from scripts/automations/dashboard buttons.

remove_unavailable_entities:
  name: Remove unavailable entities
  description: Remove entity registry entries for VPN connections that no longer exist on the Fritz!Box, then reload the integration. Optional config_entry_id limits the operation to that integration entry.
  fields:
    config_entry_id:
      name: Config entry ID
      description: Optional. Limit cleanup to this integration entry (e.g. from the integration's three-dot menu > Configure, the ID is in the URL). If omitted, all Fritz!Box VPN entries are processed.
      required: false
      selector:
        text:
